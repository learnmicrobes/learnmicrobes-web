<!-- @dsCard group="Brand" viewport="700x150" name="Logo lockup" subtitle="Tile + wordmark + clinical-bench-reference sub-label." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); }
  .wrap { padding: 28px; display: flex; flex-direction: column; gap: 18px; }
  .lock { display: flex; align-items: center; gap: 14px; }
  .lock img { width: 52px; height: 52px; border-radius: var(--radius-lg); }
  .name { font-size: 1.5rem; font-weight: 800; color: var(--text-heading); letter-spacing: -0.01em; line-height: 1; }
  .sub { font-size: 0.66rem; font-weight: 700; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }
  .ondark { background: var(--teal-700); padding: 16px 18px; border-radius: var(--radius-md); }
  .ondark .name { color: #f6fbf8; }
  .ondark .sub { color: var(--sage-300); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lock">
      <img src="../assets/brand-mark.svg" alt="" />
      <div><div class="name">Learn Microbes</div><div class="sub">Clinical Bench Reference</div></div>
    </div>
    <div class="lock ondark">
      <img src="../assets/brand-mark-flask.svg" alt="" />
      <div><div class="name">Learn Microbes</div><div class="sub">Clinical Bench Reference</div></div>
    </div>
  </div>
</body>
</html>
