<!-- @dsCard group="Colors" viewport="700x190" name="Teal ramp — brand anchor" subtitle="Deep teal / blue-green. Product anchors on 600; covers on 700." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; border: 1px solid var(--line-soft); }
  .sw b { font-size: 12px; font-weight: 700; }
  .sw span { font-size: 11px; opacity: 0.85; font-variant-numeric: tabular-nums; }
  .light b, .light span { color: #15302c; }
  .dark b, .dark span { color: #f6fbf8; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw dark" style="background:var(--teal-900)"><b>900</b><span>#1a3d3a</span></div>
      <div class="sw dark" style="background:var(--teal-800)"><b>800 · strong</b><span>#1d4a54</span></div>
      <div class="sw dark" style="background:var(--teal-700)"><b>700 · cover</b><span>#21514c</span></div>
      <div class="sw dark" style="background:var(--teal-600)"><b>600 · PRIMARY</b><span>#245c69</span></div>
      <div class="sw dark" style="background:var(--teal-500)"><b>500 · header</b><span>#2c7873</span></div>
      <div class="sw light" style="background:var(--teal-300)"><b>300</b><span>#88b8b3</span></div>
      <div class="sw light" style="background:var(--teal-100)"><b>100</b><span>#dce8de</span></div>
      <div class="sw light" style="background:var(--teal-50)"><b>50</b><span>#eef5f3</span></div>
    </div>
  </div>
</body>
</html>
