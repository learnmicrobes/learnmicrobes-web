<!-- @dsCard group="Brand" viewport="700x200" name="Brand marks" subtitle="Notebook+LM tile, flask variant, monogram, favicon." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); }
  .wrap { padding: 24px 28px; display: flex; gap: 30px; align-items: flex-start; }
  .item { text-align: center; }
  .item img { width: 76px; height: 76px; border-radius: var(--radius-lg); display: block; }
  .mono { background: var(--teal-700); padding: 8px; border-radius: var(--radius-lg); }
  b { display: block; font-size: 12px; font-weight: 700; margin-top: 10px; }
  span { display: block; font-size: 11px; color: var(--text-muted); max-width: 110px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><img src="../assets/brand-mark.svg" alt="notebook LM mark" /><b>Primary</b><span>notebook + LM, app mark</span></div>
    <div class="item"><img src="../assets/brand-mark-flask.svg" alt="flask mark" /><b>Flask</b><span>social / educational</span></div>
    <div class="item"><div class="mono"><img src="../assets/monogram-lm.svg" alt="LM monogram" style="width:60px;height:60px" /></div><b>Monogram</b><span>compact / avatar</span></div>
    <div class="item"><img src="../assets/favicon.svg" alt="favicon" style="width:48px;height:48px" /><b>Favicon</b></div>
  </div>
</body>
</html>
