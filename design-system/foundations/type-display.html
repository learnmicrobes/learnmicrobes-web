<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--text-heading); }
  .wrap { padding: 24px 28px; }
  .eyebrow { font-size: var(--fs-eyebrow); text-transform: uppercase; letter-spacing: var(--ls-eyebrow); font-weight: 700; color: var(--text-eyebrow); margin: 0 0 6px; }
  .display { font-size: 3.1rem; font-weight: 800; letter-spacing: var(--ls-tight); line-height: 1.05; margin: 0 0 4px; }
  .meta { font-size: 12px; color: var(--text-muted); margin: 2px 0 18px; }
  h1 { font-size: var(--fs-h1); font-weight: 800; letter-spacing: var(--ls-tight); line-height: 1.12; margin: 0 0 2px; }
  h2 { font-size: var(--fs-h2); font-weight: 800; line-height: 1.2; margin: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">One year of building</p>
    <p class="display">Now it&#39;s a whole bench.</p>
    <p class="meta">Display · clamp(2.4–3.55rem) · 800 · -0.02em · line-height 1.05</p>
    <h1>Name this isolate.</h1>
    <h2>An ASCP review hub.</h2>
  </div>
</body>
</html>
