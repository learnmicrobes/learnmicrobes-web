<!-- @dsCard group="Spacing" viewport="700x180" name="Radius scale" subtitle="Tight & clinical in-app; rounder on marketing; pills for tags." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); }
  .wrap { padding: 24px; display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 72px; height: 72px; background: var(--paper); border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
  .pill { width: 92px; }
  b { display: block; font-size: 12px; font-weight: 700; margin-top: 8px; }
  span { display: block; font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><b>sm</b><span>6px · UI</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><b>md</b><span>10px · cards</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><b>lg</b><span>14px · tile</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><b>xl</b><span>20px · social</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><b>2xl</b><span>28px · hero</span></div>
    <div class="item"><div class="box pill" style="border-radius:var(--radius-pill)"></div><b>pill</b><span>999 · tags</span></div>
  </div>
</body>
</html>
