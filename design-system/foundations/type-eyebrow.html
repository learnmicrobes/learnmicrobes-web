<!-- @dsCard group="Type" viewport="700x180" name="Eyebrows & tracking" subtitle="Uppercase kickers — the only tracked, all-caps type." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-app); color: var(--text-body); }
  .wrap { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .e { font-size: var(--fs-eyebrow); text-transform: uppercase; letter-spacing: var(--ls-eyebrow); font-weight: 700; }
  .teal { color: var(--teal-600); }
  .sage { color: var(--sage-600); }
  .ondark { background: var(--teal-700); color: var(--sage-400); padding: 14px 16px; border-radius: var(--radius-md); display: inline-block; }
  .meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <span class="e teal">CLINICAL MICROBIOLOGY &amp; ASCP REVIEW</span>
    <span class="e sage">BUILT FOR THE BOARDS</span>
    <span class="ondark e">FREE TO START</span>
    <span class="meta">0.72rem · 700 · letter-spacing 0.12em · teal on light, sage on dark teal</span>
  </div>
</body>
</html>
