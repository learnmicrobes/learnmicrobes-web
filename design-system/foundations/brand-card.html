<!-- @dsCard group="Brand" viewport="700x230" name="Card anatomy" subtitle="White, rounded, hairline border, soft shadow — on warm canvas." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--text-body); }
  .wrap { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--paper); border: 1px solid var(--border-card); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 18px 20px; }
  .eyebrow { font-size: var(--fs-eyebrow); text-transform: uppercase; letter-spacing: var(--ls-eyebrow); font-weight: 700; color: var(--text-eyebrow); margin: 0 0 6px; }
  h3 { font-size: 1.1rem; font-weight: 800; color: var(--text-heading); margin: 0 0 6px; }
  p { font-size: 0.86rem; line-height: 1.5; color: var(--text-muted); margin: 0; }
  .ui { border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
  .specimen { background: var(--cream-100); border-radius: var(--radius-md); height: 56px; margin-top: 12px; position: relative; border: 1px solid var(--line-soft); }
  .specimen span { position: absolute; top: 8px; left: 8px; background: var(--teal-700); color: #fff; font-size: 0.7rem; font-weight: 700; padding: 4px 9px; border-radius: var(--radius-sm); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="eyebrow">Bench card · radius-xl</p>
      <h3>Indole production</h3>
      <p>Larger rounding (20px) and soft md shadow — the marketing &amp; educational card.</p>
      <div class="specimen"><span>Specimen A</span></div>
    </div>
    <div class="card ui" style="border-radius:var(--radius-md)">
      <p class="eyebrow">Product card · radius-md</p>
      <h3>I am reviewing for ASCP</h3>
      <p>Tighter, clinical rounding (10px) with a low sm shadow — the in-app card.</p>
    </div>
  </div>
</body>
</html>
