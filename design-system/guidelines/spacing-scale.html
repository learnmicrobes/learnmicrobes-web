<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · calm clinical rhythm" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-ui);padding:22px;display:flex;gap:14px;align-items:flex-end}
  .u{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--lm-teal-600);border-radius:3px;width:100%}
  .box{width:46px;display:flex;justify-content:center}
  .lab{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
  .px{font-size:11px;font-weight:700;color:var(--text-heading)}
</style></head>
<body>
  <div class="u"><div class="box"><div class="bar" style="height:4px;width:4px"></div></div><span class="px">4</span><span class="lab">1</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:8px;width:8px"></div></div><span class="px">8</span><span class="lab">2</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:12px;width:12px"></div></div><span class="px">12</span><span class="lab">3</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:16px;width:16px"></div></div><span class="px">16</span><span class="lab">4</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:24px;width:24px"></div></div><span class="px">24</span><span class="lab">6</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:32px;width:32px"></div></div><span class="px">32</span><span class="lab">8</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:48px;width:48px"></div></div><span class="px">48</span><span class="lab">12</span></div>
  <div class="u"><div class="box"><div class="bar" style="height:64px;width:64px"></div></div><span class="px">64</span><span class="lab">16</span></div>
</body></html>
