<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft, low-spread depth — never dramatic" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:26px 22px;display:flex;gap:20px;align-items:center}
  .u{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:96px;height:62px;background:#fff;border-radius:var(--radius-md)}
  .name{font-size:11px;font-weight:700;color:var(--text-heading)}
  .v{font-size:9.5px;color:var(--text-muted);font-family:var(--font-mono)}
  .brand{background:var(--lm-teal-600)}
</style></head>
<body>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="name">sm</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="name">card</span><span class="v">workhorse</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="name">md</span></div>
  <div class="u"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="name">lg</span><span class="v">hover</span></div>
  <div class="u"><div class="box brand" style="box-shadow:var(--shadow-brand)"></div><span class="name">brand</span><span class="v">on teal</span></div>
</body></html>
