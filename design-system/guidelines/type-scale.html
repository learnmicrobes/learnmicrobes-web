<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Display sizes → body → caption" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-ui);padding:20px 22px;color:var(--text-heading)}
  .r{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:var(--hairline)}
  .r:last-child{border:none}
  .lab{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);width:130px;flex-shrink:0}
  .spec{font-family:var(--font-display);font-weight:800;letter-spacing:-.015em;line-height:1}
</style></head>
<body>
  <div class="r"><span class="lab">display-lg · 800</span><span class="spec" style="font-size:2.6rem">Bench-first</span></div>
  <div class="r"><span class="lab">h1 · 800</span><span class="spec" style="font-size:1.875rem">Visual atlas</span></div>
  <div class="r"><span class="lab">h2 · 700</span><span class="spec" style="font-size:1.5rem">Key tests</span></div>
  <div class="r"><span class="lab">h3 · 700 · Inter</span><span class="spec" style="font-size:1.2rem;font-family:var(--font-ui)">Catalase</span></div>
  <div class="r"><span class="lab">body · 400 · Inter</span><span class="spec" style="font-size:.95rem;font-weight:400;font-family:var(--font-ui);color:var(--text-body)">Safest next step on the bench</span></div>
  <div class="r"><span class="lab">caption · 700 · Inter</span><span class="spec" style="font-size:.7rem;font-weight:700;font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted)">Specimen source</span></div>
</body></html>
