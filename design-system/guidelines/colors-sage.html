<!-- @dsCard group="Colors" viewport="700x150" name="Sage — green accent" subtitle="Controlled green: go / correct / interactive" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-sm);overflow:hidden;border:var(--hairline)}
  .chip{height:64px}
  .meta{padding:7px 9px;background:#fff}
  .name{font-size:11px;font-weight:700;color:var(--text-heading)}
  .hex{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lm-sage-200)"></div><div class="meta"><div class="name">sage-200 · surface</div><div class="hex">#dce8de</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-sage-300)"></div><div class="meta"><div class="name">sage-300</div><div class="hex">#a9cdb4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-sage-400)"></div><div class="meta"><div class="name">sage-400 · accent</div><div class="hex">#84b596</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-sage-500)"></div><div class="meta"><div class="name">sage-500 · interactive</div><div class="hex">#6fb98f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-sage-600)"></div><div class="meta"><div class="name">sage-600 · success</div><div class="hex">#4f8f67</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-sage-700)"></div><div class="meta"><div class="name">sage-700</div><div class="hex">#3e7654</div></div></div>
  </div>
</body></html>
