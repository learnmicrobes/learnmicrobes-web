<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Inputs → cards → editorial → pills" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:22px;display:flex;gap:16px;align-items:center}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:78px;height:58px;background:#fff;border:var(--hairline);box-shadow:var(--shadow-sm)}
  .name{font-size:11px;font-weight:700;color:var(--text-heading)}
  .v{font-size:10px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head>
<body>
  <div class="u"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="name">xs</span><span class="v">5px · input</span></div>
  <div class="u"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="name">sm</span><span class="v">6px · button</span></div>
  <div class="u"><div class="box" style="border-radius:var(--radius-md)"></div><span class="name">md</span><span class="v">10px · card</span></div>
  <div class="u"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="name">lg</span><span class="v">16px · editorial</span></div>
  <div class="u"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="name">xl</span><span class="v">20px · tile</span></div>
  <div class="u"><div class="box" style="border-radius:var(--radius-pill);width:78px"></div><span class="name">pill</span><span class="v">999px · CTA</span></div>
</body></html>
