<!-- @dsCard group="Colors" viewport="700x200" name="Two background modes" subtitle="Warm paper (editorial) · deep forest green (marketing)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:20px;display:flex;gap:14px}
  .mode{flex:1;border-radius:var(--radius-lg);padding:20px 22px;min-height:120px;box-shadow:var(--shadow-card)}
  .paper{background:var(--lm-paper-200);border:var(--hairline)}
  .green{background:var(--lm-teal-800)}
  .kick{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  .head{font-family:var(--font-display);font-weight:800;font-size:1.5rem;line-height:1.1;margin:8px 0 0;letter-spacing:-.018em}
  .paper .kick{color:var(--lm-sage-600)} .paper .head{color:var(--text-heading)}
  .green .kick{color:var(--lm-sage-400)} .green .head{color:#f6fbf8}
  .card{margin-top:14px;background:#fff;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--text-body);box-shadow:var(--shadow-sm);display:inline-block}
  .pill{margin-top:14px;background:var(--lm-sage-400);color:var(--lm-teal-800);border-radius:999px;padding:7px 16px;font-size:12px;font-weight:700;display:inline-block}
</style></head>
<body>
  <div class="mode paper">
    <div class="kick">QUESTION</div>
    <div class="head">Name this isolate.</div>
    <div class="card">Sheep blood agar · β-hemolytic</div>
  </div>
  <div class="mode green">
    <div class="kick">FREE TO START</div>
    <div class="head">Learn the patterns.</div>
    <div class="pill">Try it</div>
  </div>
</body></html>
