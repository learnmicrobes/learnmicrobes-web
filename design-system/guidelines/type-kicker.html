<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-ui);padding:22px;display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center}
  .k{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
  .sage{color:var(--lm-sage-600)} .teal{color:var(--lm-teal-600)} .muted{color:var(--text-muted)}
  .pill{background:var(--lm-teal-800);color:#f6fbf8;border-radius:999px;padding:6px 14px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
</style></head>
<body>
  <span class="k sage">QUESTION</span>
  <span class="k teal">CLINICAL BENCH REFERENCE</span>
  <span class="k muted">DON'T CONFUSE IT WITH</span>
  <span class="pill">MICRO CHALLENGE #06</span>
  <span class="pill" style="background:var(--lm-sage-400);color:var(--lm-teal-800)">INTERMEDIATE</span>
</body></html>
