<!-- @dsCard group="Colors" viewport="700x150" name="Paper & ink neutrals" subtitle="Warm off-white surfaces, soft slate ink" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-sm);overflow:hidden;border:var(--hairline)}
  .chip{height:64px}
  .meta{padding:7px 9px;background:#fff}
  .name{font-size:11px;font-weight:700;color:var(--text-heading)}
  .hex{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lm-paper-50)"></div><div class="meta"><div class="name">paper-50 · app bg</div><div class="hex">#faf7f0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-paper-100)"></div><div class="meta"><div class="name">paper-100 · surface</div><div class="hex">#f4efe4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-paper-200)"></div><div class="meta"><div class="name">paper-200 · cream</div><div class="hex">#f0ece3</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-ink-500)"></div><div class="meta"><div class="name">ink-500 · muted</div><div class="hex">#5f6b77</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-ink-700)"></div><div class="meta"><div class="name">ink-700 · body</div><div class="hex">#2b3a44</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-ink-900)"></div><div class="meta"><div class="name">ink-900 · heading</div><div class="hex">#1c2733</div></div></div>
  </div>
</body></html>
