<!-- @dsCard group="Brand" viewport="700x200" name="Brand marks" subtitle="Notebook lockup, app tile, flask & monogram variants" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:22px}
  .grid{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .u{display:flex;flex-direction:column;align-items:center;gap:9px}
  .name{font-size:10.5px;font-weight:700;color:var(--text-heading)}
  .v{font-size:9.5px;color:var(--text-muted)}
  img.tile{width:62px;height:62px;border-radius:16px;box-shadow:var(--shadow-card)}
</style></head>
<body>
  <div class="grid">
    <div class="u"><img class="tile" src="../assets/brand-mark.svg"><span class="name">App tile</span><span class="v">notebook · LM</span></div>
    <div class="u"><img class="tile" src="../assets/flask-mark.svg"><span class="name">Flask</span><span class="v">social</span></div>
    <div class="u"><img class="tile" src="../assets/lm-monogram.svg"><span class="name">Monogram</span><span class="v">on green</span></div>
    <div class="u"><img src="../assets/logo-full.svg" style="height:52px"><span class="name">Primary lockup</span></div>
  </div>
</body></html>
