<!-- @dsCard group="Colors" viewport="700x150" name="Teal — primary anchor" subtitle="Deep teal / blue-green brand ramp" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-ui);padding:20px}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-sm);overflow:hidden;border:var(--hairline)}
  .chip{height:64px}
  .meta{padding:7px 9px;background:#fff}
  .name{font-size:11px;font-weight:700;color:var(--text-heading)}
  .hex{font-size:10.5px;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--lm-teal-500)"></div><div class="meta"><div class="name">teal-500</div><div class="hex">#2c7873</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-teal-600)"></div><div class="meta"><div class="name">teal-600 · brand</div><div class="hex">#245c69</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-teal-700)"></div><div class="meta"><div class="name">teal-700 · strong</div><div class="hex">#1d4a54</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-teal-800)"></div><div class="meta"><div class="name">teal-800 · deep</div><div class="hex">#1a463d</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-teal-900)"></div><div class="meta"><div class="name">teal-900</div><div class="hex">#143a34</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--lm-teal-100)"></div><div class="meta"><div class="name">teal-100</div><div class="hex">#d2e4e2</div></div></div>
  </div>
</body></html>
