<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learn Microbes — Web App</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; }
  body { background: var(--surface-app); font-family: var(--font-ui); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  .lm-footer { background: var(--lm-teal-800); color: rgba(244,239,228,0.82); padding: 1.6rem 1.5rem; font-size: 0.85rem; }
  .lm-footer a { color: rgba(244,239,228,0.9); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="NavBar.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="ToolsScreen.jsx"></script>
<script type="text/babel" src="LearnScreen.jsx"></script>
<script type="text/babel" src="PracticeScreen.jsx"></script>
<script type="text/babel" data-presets="react">
  function App() {
    const { NavBar, HomeScreen, ToolsScreen, LearnScreen, PracticeScreen } = window;
    const [view, setView] = React.useState('home');
    const go = (v) => { setView(v); window.scrollTo({ top: 0 }); };

    let screen;
    if (view === 'home') screen = <HomeScreen onNav={go} />;
    else if (view === 'tools') screen = <ToolsScreen onNav={go} />;
    else if (view === 'practice') screen = <PracticeScreen />;
    else if (view === 'visuals') screen = <LearnScreen mode="visuals" onNav={go} />;
    else screen = <LearnScreen mode="learn" onNav={go} />;

    return (
      <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
        <NavBar active={view} onNav={go} onCreate={() => go('practice')} />
        <main style={{ flex: 1 }}>{screen}</main>
        <footer className="lm-footer">
          <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16, alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <img src="../../assets/lm-monogram.svg" width="34" height="34" alt="" />
              <span>Learn Microbes · Clinical Bench Reference</span>
            </div>
            <span>Built by a working micro lab tech · For education only — not diagnostic guidance.</span>
          </div>
        </footer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
