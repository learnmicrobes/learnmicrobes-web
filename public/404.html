<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Learn Microbes</title>
    <script>
      (function () {
        var ignoredParams = {
          fbclid: true,
          gclid: true,
          msclkid: true
        };
        var params = new URLSearchParams(window.location.search);
        var cleanedParams = new URLSearchParams();

        params.forEach(function (value, key) {
          if (ignoredParams[key] || key.indexOf('utm_') === 0) {
            return;
          }
          cleanedParams.append(key, value);
        });

        var cleanedSearch = cleanedParams.toString();
        var redirectPath = window.location.pathname +
          (cleanedSearch ? '?' + cleanedSearch : '') +
          window.location.hash;

        try {
          sessionStorage.setItem('learnmicrobes_redirect_path', redirectPath);
        } catch (error) {
          // Some in-app/social browsers restrict storage. The query fallback still carries the route.
        }
        window.location.replace('/?lm_path=' + encodeURIComponent(redirectPath));
      }());
    </script>
  </head>
  <body>
    Redirecting to Learn Microbes...
  </body>
</html>
